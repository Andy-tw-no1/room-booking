<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>填寫下週志願 - 屏大熱音</title>
    <style>
        body {
            /* 改為極致純黑背景 */
            background: #0b0505;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 30px 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .wrapper {
            width: 100%;
            max-width: 550px;
            /* 背景調整為黑灰色 */
            background: rgba(20, 10, 10, 0.6);
            padding: 30px;
            border-radius: 12px;
            /* 邊框改為帶有暗紅線條 */
            border: 1px solid rgba(255, 0, 51, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        h2 {
            margin-top: 0;
            /* 改為亮紅色，並帶有紅光外框特效 */
            color: #ff0033;
            text-shadow: 0 0 12px rgba(255, 0, 51, 0.5);
            text-align: center;
        }
        #nowTime {
            text-align: center;
            font-size: 0.9rem;
            /* 時間顯示改為亮紅 */
            color: #ff3355;
            margin-bottom: 25px;
            background: rgba(255, 0, 51, 0.1);
            padding: 8px;
            border-radius: 6px;
            border: 1px solid rgba(255, 0, 51, 0.15);
        }
        .wish-block {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255, 0, 51, 0.1);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .wish-title {
            /* 志願標題改為烈火紅 */
            color: #ff0033;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }
        .form-row {
            display: flex;
            gap: 10px;
        }
        .form-group {
            flex: 1;
            margin-bottom: 10px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #ccc;
            font-size: 0.85rem;
        }
        input, select {
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            color: #fff;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            /* 聚焦時框線變紅 */
            border-color: #ff0033;
            box-shadow: 0 0 10px rgba(255, 0, 51, 0.4);
        }
        select option {
            background: #140505; /* 下拉選單背景也改成暗紅色調 */
        }
        .form-group-full {
            margin-bottom: 20px;
        }
        /* 送出按鈕徹底改為烈火紅漸層，並保持質感 */
        .btn-submit {
            width: 100%;
            background: linear-gradient(45deg, #cc0029, #ff0033);
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 0, 51, 0.3);
            transition: transform 0.2s, opacity 0.2s;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            opacity: 0.95;
            box-shadow: 0 5px 20px rgba(255, 0, 51, 0.6);
        }
        /* 停用按鈕（防連點生效時）的樣式 */
        .btn-submit:disabled {
            background: #444 !important;
            box-shadow: none !important;
            cursor: not-allowed;
            transform: none !important;
            opacity: 0.6;
        }
        .btn-back {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .btn-back:hover { color: #ff0033; } /* 滑鼠移上去返回變紅 */
        .notice {
            background: rgba(255, 0, 51, 0.05);
            border-left: 4px solid #ff0033;
            padding: 10px 14px;
            border-radius: 4px;
            color: #bbb;
            font-size: 0.85rem;
            margin-bottom: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <h2>下週志願登記</h2>
    <div id="nowTime">目前時間：載入中...</div>

    <div class="notice">
        📋 請填寫下週想練團的時段志願（最多5個）<br>
        ⏰ 每週日 21:00 截止，21:10 公布結果<br>
        🎯 系統將自動分配，每團最多得標 1 個時段<br>
        🕐 開始時間為整點，時長 1 或 2 小時，最晚至 24:00<br>
        ☀️ 電腦版上午下午分別為1和2
    </div>

    <form action="submit_wish.php" method="POST" onsubmit="const btn=this.querySelector('.btn-submit'); btn.disabled=true; btn.innerText='送出中，請稍候...';">
        <div class="form-group-full">
            <label>使用者姓名</label>
            <input type="text" name="user" placeholder="請輸入您的姓名" required>
        </div>
        <div class="form-group-full">
            <label>樂團名稱</label>
            <input type="text" name="band_name" placeholder="請輸入團名" required>
        </div>

        <div class="wish-block">
            <div class="wish-title">第 1 志願</div>
            <div class="form-row">
                <div class="form-group">
                    <label>日期</label>
                    <input type="date" name="wish1_date" required class="date-input">
                </div>
                <div class="form-group">
                    <label>開始時間</label>
                    <select name="wish1_start" id="wish1_start" required></select>
                </div>
                <div class="form-group">
                    <label>時長</label>
                    <select name="wish1_duration" required>
                        <option value="1">1 小時</option>
                        <option value="2">2 小時</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="wish-block">
            <div class="wish-title">第 2 志願（選填）</div>
            <div class="form-row">
                <div class="form-group">
                    <label>日期</label>
                    <input type="date" name="wish2_date" class="date-input">
                </div>
                <div class="form-group">
                    <label>開始時間</label>
                    <select name="wish2_start" id="wish2_start"></select>
                </div>
                <div class="form-group">
                    <label>時長</label>
                    <select name="wish2_duration">
                        <option value="">不填</option>
                        <option value="1">1 小時</option>
                        <option value="2">2 小時</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="wish-block">
            <div class="wish-title">第 3 志願（選填）</div>
            <div class="form-row">
                <div class="form-group">
                    <label>日期</label>
                    <input type="date" name="wish3_date" class="date-input">
                </div>
                <div class="form-group">
                    <label>開始時間</label>
                    <select name="wish3_start" id="wish3_start"></select>
                </div>
                <div class="form-group">
                    <label>時長</label>
                    <select name="wish3_duration">
                        <option value="">不填</option>
                        <option value="1">1 小時</option>
                        <option value="2">2 小時</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="wish-block">
            <div class="wish-title">第 4 志願（選填）</div>
            <div class="form-row">
                <div class="form-group">
                    <label>日期</label>
                    <input type="date" name="wish4_date" class="date-input">
                </div>
                <div class="form-group">
                    <label>開始時間</label>
                    <select name="wish4_start" id="wish4_start"></select>
                </div>
                <div class="form-group">
                    <label>時長</label>
                    <select name="wish4_duration">
                        <option value="">不填</option>
                        <option value="1">1 小時</option>
                        <option value="2">2 小時</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="wish-block">
            <div class="wish-title">第 5 志願（選填）</div>
            <div class="form-row">
                <div class="form-group">
                    <label>日期</label>
                    <input type="date" name="wish5_date" class="date-input">
                </div>
                <div class="form-group">
                    <label>開始時間</label>
                    <select name="wish5_start" id="wish5_start"></select>
                </div>
                <div class="form-group">
                    <label>時長</label>
                    <select name="wish5_duration">
                        <option value="">不填</option>
                        <option value="1">1 小時</option>
                        <option value="2">2 小時</option>
                    </select>
                </div>
            </div>
        </div>

        <button type="submit" class="btn-submit">送出志願</button>
    </form>

    <a href="index.html" class="btn-back">返回首頁</a>
</div>

<script>
function updateTime() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth()+1).padStart(2,'0');
    const d = String(now.getDate()).padStart(2,'0');
    const h = String(now.getHours()).padStart(2,'0');
    const i = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById("nowTime").innerHTML = `目前時間：${y}-${m}-${d} ${h}:${i}:${s}`;
}
setInterval(updateTime, 1000);
updateTime();

function buildTimeOptions(selectId, required) {
    const select = document.getElementById(selectId);
    const defaultOpt = document.createElement("option");
    defaultOpt.value = "";
    defaultOpt.text = required ? "請選擇" : "請選擇（可不填）";
    select.appendChild(defaultOpt);
    for (let h = 9; h <= 22; h++) {
        const opt = document.createElement("option");
        opt.value = String(h).padStart(2,'0') + ":00";
        opt.text = String(h).padStart(2,'0') + ":00";
        select.appendChild(opt);
    }
}

buildTimeOptions("wish1_start", true);
buildTimeOptions("wish2_start", false);
buildTimeOptions("wish3_start", false);
buildTimeOptions("wish4_start", false);
buildTimeOptions("wish5_start", false);

document.addEventListener("DOMContentLoaded", function () {
    const today = new Date();
    const dayOfWeek = today.getDay();
    const daysUntilNextMonday = dayOfWeek === 0 ? 1 : 8 - dayOfWeek;
    const nextMonday = new Date(today);
    nextMonday.setDate(today.getDate() + daysUntilNextMonday);
    const nextSunday = new Date(nextMonday);
    nextSunday.setDate(nextMonday.getDate() + 6);

    const minDate = nextMonday.toISOString().split("T")[0];
    const maxDate = nextSunday.toISOString().split("T")[0];

    document.querySelectorAll(".date-input").forEach(input => {
        input.min = minDate;
        input.max = maxDate;
    });
});
</script>
</body>
</html>
