<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>屏大熱音團室預約系統</title>
    <style>
        body {
            /* 背景改為帶暗紅擴散的深邃純黑感 */
            background: radial-gradient(circle at center, #1a0505 0%, #000000 100%);
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: rgba(20, 5, 5, 0.6);
            padding: 40px 40px;
            border-radius: 16px;
            /* 邊框改為微弱紅光 */
            border: 1px solid rgba(255, 0, 51, 0.2);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            width: 100%;
            max-width: 400px;
        }

        /* =====================
           新增：Logo 專用樣式
           ===================== */
        .logo-container {
            text-align: center;
            margin-bottom: 10px;
        }
        .club-logo {
            width: 130px; /* 調整首頁 Logo 大小 */
            height: auto;
            filter: drop-shadow(0 0 10px rgba(255, 0, 51, 0.5)); /* Logo 紅色發光 */
            transition: all 0.3s ease;
        }
        .club-logo:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 18px rgba(255, 0, 51, 0.8));
        }

        h1 {
            font-size: 2.3rem;
            margin: 10px 0 5px 0;
            letter-spacing: 2px;
            /* 標題漸層改為：烈火紅 到 曜石黑灰 */
            background: linear-gradient(45deg, #ff0033, #aa0022);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 0, 51, 0.4);
        }
        p {
            color: #777;
            margin-bottom: 30px;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }
        .section-label {
            color: #cc0029; /* 區塊標籤改為血紅色 */
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 15px 0 10px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            background: transparent;
            color: #fff;
            border: 2px solid;
            padding: 13px 30px;
            font-size: 1.05rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        
        /* 統一按鈕色彩：黑底、紅框、滑鼠移上去時亮烈火紅 */
        .btn-red {
            border-color: #ff0033;
            box-shadow: 0 0 15px rgba(255, 0, 51, 0.15);
        }
        .btn-red:hover {
            background: #ff0033;
            color: #fff;
            box-shadow: 0 0 25px rgba(255, 0, 51, 0.6);
            transform: translateY(-3px);
        }
        
        .divider {
            border: none;
            border-top: 1px solid rgba(255, 0, 51, 0.15);
            margin: 25px 0;
        }
    </style>
</head>
<body>
<div class="container">
    
    <div class="logo-container">
        <img src="logo.png" alt="屏大熱音 Logo" class="club-logo">
    </div>

    <h1>屏大熱音</h1>
    <p>NPTU HOT MUSIC</p>

    <div class="section-label">預約狀況</div>
    <div class="btn-group">
        <a href="view.php" class="btn btn-red">查看團室名單</a>
    </div>

    <hr class="divider">

    <div class="section-label">時段爭奪戰</div>
    <div class="btn-group">
        <a href="booking.html" class="btn btn-red">登記下週志願</a>
    </div>
</div>
</body>
</html>
