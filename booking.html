<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>教室預約系統</title>
</head>
<body>

<h2>教室預約系統</h2>

<!-- 🟢 即時時間 -->
<h3 id="nowTime"></h3>

<script>
function updateTime()
{
    const now = new Date();

    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');

    const hour = String(now.getHours()).padStart(2, '0');
    const minute = String(now.getMinutes()).padStart(2, '0');
    const second = String(now.getSeconds()).padStart(2, '0');

    document.getElementById("nowTime").innerHTML =
        `目前時間：${year}-${month}-${day} ${hour}:${minute}:${second}`;
}

updateTime();
setInterval(updateTime, 1000);
</script>

<hr>

<!-- 🟢 預約表單 -->
<form action="book.php" method="POST">

    使用者：
    <input type="text" name="user" required>
    <br><br>

    日期：
    <input type="date" name="date" required>
    <br><br>

    開始時間：
    <input type="time" name="start" required>
    <br><br>

    結束時間：
    <input type="time" name="end" required>
    <br><br>

    <!-- 🟢 驗證碼 -->
    <div>驗證碼：</div>

    <div style="border:1px solid #ccc;width:120px;text-align:center;padding:5px;">
        <iframe src="captcha.php"
                style="border:none;width:120px;height:40px;"></iframe>
    </div>

    <br>

    輸入驗證碼：
    <input type="text" name="captcha" required>

    <br><br>

    <button type="submit">預約</button>

</form>

</body>
</html>
