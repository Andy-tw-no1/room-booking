<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>屏大熱音團室預約系統</title>
</head>
<body>

<h2>團室預約系統</h2>

<h3 id="nowTime"></h3>

<script>
function updateTime()
{
    const now = new Date();

    const y = now.getFullYear();
    const m = String(now.getMonth()+1).padStart(2,'0');
    const d = String(now.getDate()).padStart(2,'0');

    const h = String(now.getHours()).padStart(2,'0');
    const i = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');

    document.getElementById("nowTime").innerHTML =
        `目前時間：${y}-${m}-${d} ${h}:${i}:${s}`;
}

setInterval(updateTime,1000);
updateTime();

function refreshCaptcha()
{
    document.getElementById("cap").src = "captcha.php?" + Date.now();
}
</script>

<hr>

<form action="book.php" method="POST">

    使用者：
    <input type="text" name="user" required>
    <br><br>

    日期：
    <input type="date" name="date" required>
    <br><br>

    開始時間：
    <input type="time" name="start" required>
    <br><br>

    結束時間：
    <input type="time" name="end" required>
    <br><br>

    驗證碼：
    <br>

    <iframe id="cap"
        src="captcha.php"
        style="border:1px solid #ccc;width:120px;height:40px;">
    </iframe>

    <br>

    <button type="button" onclick="refreshCaptcha()">刷新驗證碼</button>

    <br><br>

    輸入驗證碼：
    <input type="text" name="captcha" required>

    <br><br>

    <button type="submit">預約</button>

</form>

</body>
</html>
