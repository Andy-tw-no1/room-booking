<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>屏大熱音團室預約系統</title>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        input {
            padding: 6px;
            margin: 5px 0;
        }

        button {
            padding: 6px 12px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h2>團室預約系統</h2>

<hr>

<form action="book.php" method="POST">

    使用者：
    <input type="text" name="user" required>
    <br><br>

    日期：
    <input type="date" name="date" required>
    <br><br>

    開始時間：
    <input type="time" name="start" step="1800" required>
    <br><br>

    結束時間：
    <input type="time" name="end" step="1800" required>
    <br><br>

    <button type="submit">預約</button>

</form>

</body>
</html>
